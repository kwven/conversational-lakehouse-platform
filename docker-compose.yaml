name: conversational-lakehouse

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: instacart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d instacart"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse-net

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.2.6
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
      - "19644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info -X brokers=redpanda:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - lakehouse-net

  kafka-connect:
    image: quay.io/debezium/connect:3.0
    container_name: kafka-connect
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: "1"
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
      REST_ADVERTISED_HOST_NAME: kafka-connect
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - lakehouse-net

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - lakehouse-net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 minio minio123
        mc mb -p local/warehouse || true
        mc mb -p local/checkpoints || true
        mc mb -p local/raw || true
    networks:
      - lakehouse-net

  spark:
    image: spark:3.5.8
    container_name: spark
    depends_on:
      redpanda:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./spark:/opt/bitnami/spark/jobs
      - ./data:/opt/bitnami/spark/data
    networks:
      - lakehouse-net
  
  polaris:
    image: apache/polaris:latest
    container_name: polaris
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,root,s3cr3t
      polaris.realm-context.realms: POLARIS
      quarkus.otel.sdk.disabled: "true"
    ports:
      - "8181:8181"
      - "8182:8182"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - lakehouse-net
  
  polaris-setup:
    image: alpine/curl:8.17.0
    container_name: polaris-setup
    depends_on:
      polaris:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        apk add --no-cache jq

        TOKEN_RESPONSE=$(curl --fail-with-body -s -S -X POST \
          http://polaris:8181/api/catalog/v1/oauth/tokens \
          -H 'Content-Type: application/x-www-form-urlencoded' \
          -d 'grant_type=client_credentials&client_id=root&client_secret=s3cr3t&scope=PRINCIPAL_ROLE:ALL')

        TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

        PAYLOAD='{
          "catalog": {
            "name": "quickstart_catalog",
            "type": "INTERNAL",
            "readOnly": false,
            "properties": {
              "default-base-location": "s3://warehouse"
            },
            "storageConfigInfo": {
              "storageType": "S3",
              "allowedLocations": ["s3://warehouse"],
              "endpoint": "http://localhost:9000",
              "endpointInternal": "http://minio:9000",
              "pathStyleAccess": true
            }
          }
        }'

        curl --fail-with-body -s -S -X POST \
          http://polaris:8181/api/management/v1/catalogs \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/json" \
          -H "Content-Type: application/json" \
          -H "Polaris-Realm: POLARIS" \
          -d "$PAYLOAD" || true

        touch /tmp/polaris-setup-done
        tail -f /dev/null
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/polaris-setup-done"]
      interval: 5s
      timeout: 5s
      retries: 60
    networks:
      - lakehouse-net

  trino:
    image: trinodb/trino:457
    container_name: trino
    depends_on:
      polaris-setup:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      CLIENT_ID: root
      CLIENT_SECRET: s3cr3t
    ports:
      - "8080:8080"
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog
    networks:
      - lakehouse-net

volumes:
  postgres_data:
  redpanda_data:
  minio_data:

networks:
  lakehouse-net:
    driver: bridge