name: conversational-lakehouse-platform

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: instacart
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d instacart"]
      interval: 10s
      timeout: 5s
      retries: 10

  metastore-db:
    image: postgres:16
    container_name: metastore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore_db
    ports:
      - "5434:5432"
    volumes:
      - metastore-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-driver-init:
    image: alpine:3.19
    container_name: postgres-driver-init
    user: root
    restart: "no"
    command: >
      sh -c "apk add --no-cache curl && 
             mkdir -p /drivers && 
             chmod 777 /drivers && 
             if [ ! -f /drivers/postgresql-42.7.7.jar ]; then 
               curl -L https://jdbc.postgresql.org/download/postgresql-42.7.7.jar -o /drivers/postgresql-42.7.7.jar; 
             fi"
    volumes:
      - hive-jdbc-drivers:/drivers

  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka
    restart: unless-stopped
    ports:
      - "29092:29092"
    environment:
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-connect:
    image: quay.io/debezium/connect:3.3.0.Final
    container_name: kafka-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      REST_ADVERTISED_HOST_NAME: kafka-connect
      REST_PORT: 8083
      PLUGIN_PATH: /kafka/connect,/debezium-connector-postgres

    volumes:
      - ./infra/debezium/connectors:/connectors
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka-connect-init:
    image: curlimages/curl:8.7.1
    container_name: kafka-connect-init
    restart: "no"
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./infra/debezium/connectors:/connectors
    entrypoint:
      - /bin/sh
      - -c
    command: |
      set -e
      echo "Waiting for Kafka Connect..."
      until curl -sf http://kafka-connect:8083/connectors > /dev/null; do
        sleep 3
      done
      echo "Registering Debezium connector if missing..."
      if curl -sf http://kafka-connect:8083/connectors/instacart-postgres-cdc > /dev/null; then
        echo "Connector already exists"
      else
        curl -s -X POST http://kafka-connect:8083/connectors \
          -H 'Accept: application/json' \
          -H 'Content-Type: application/json' \
          --data @/connectors/postgres-cdc.json
      fi
      echo "Done"

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        /usr/bin/mc alias set local http://minio:9000 minio minio123
        /usr/bin/mc mb --ignore-existing local/lakehouse
        /usr/bin/mc mb --ignore-existing local/checkpoints
        /usr/bin/mc anonymous set none local/lakehouse
        /usr/bin/mc anonymous set none local/checkpoints

  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive-metastore
    restart: unless-stopped
    depends_on:
      metastore-db:
        condition: service_healthy
      postgres-driver-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore-db:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    ports:
      - "9083:9083"
    volumes:
      - hive-warehouse:/opt/hive/data/warehouse
      - hive-jdbc-drivers:/opt/hive/lib
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9083'"]
      interval: 15s
      timeout: 5s
      retries: 20

  spark-master:
    image: spark:4.0.2-python3
    container_name: spark-master
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      hive-metastore:
        condition: service_healthy
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_LOCAL_IP: spark-master
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_REGION: us-east-1
    ports:
      - "7077:7077"
      - "4040:4040"
      - "8081:8080"
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: >-
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master
      --port 7077
      --webui-port 8080

  spark-worker:
    image: spark:4.0.2-python3
    container_name: spark-worker
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_started
    environment:
      SPARK_LOCAL_IP: spark-worker
      SPARK_LOCAL_DIRS: /tmp/spark-local
      SPARK_WORKER_OPTS: >-
        -Dspark.worker.dir=/tmp/spark-local/worker
        -Dspark.worker.cleanup.enabled=true
        -Dspark.worker.cleanup.interval=600
        -Dspark.worker.cleanup.appDataTtl=3600
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_REGION: us-east-1
    volumes:
      - ./:/workspace
    tmpfs:
      - /tmp/spark-local:rw,mode=1777
    working_dir: /workspace
    command: >-
      /bin/bash -lc 'mkdir -p /tmp/spark-local/worker &&
      exec /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077'

  spark-submit:
    image: spark:4.0.2-python3
    container_name: spark-submit
    profiles: ["manual"]
    depends_on:
      spark-master:
        condition: service_started
      minio:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_REGION: us-east-1
      SPARK_LOCAL_IP: spark-submit
      SPARK_LOCAL_DIRS: /tmp/spark-local
    volumes:
      - ./:/workspace
    tmpfs:
      - /tmp/spark-local:rw,mode=1777
    working_dir: /workspace
    entrypoint:
      - /bin/bash
      - -lc
    command: tail -f /dev/null

  trino:
    image: trinodb/trino:480
    container_name: trino
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  metastore-db-data:
  kafka-data:
  minio-data:
  hive-warehouse:
  hive-jdbc-drivers:
